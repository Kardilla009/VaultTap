<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - VaultTap</title>
<meta name="theme-color" content="#05070A">
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          vault: {
            black: '#05070A',
            surface: '#0C1016',
            surface2: '#131A24',
            border: '#1C2431',
            cyan: '#00E5FF',
            blue: '#3B82F6',
            mint: '#22D3A5',
            text: '#F5F7FA',
            muted: '#8B96A5',
          }
        },
        fontFamily: {
          display: ['"Space Grotesk"', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
        boxShadow: {
          'glow-cyan': '0 0 0 1px rgba(0,229,255,0.15), 0 8px 30px -8px rgba(0,229,255,0.35)',
        }
      }
    }
  }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<style>
  body {
    background-color: #05070A;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  ::selection { background: rgba(0,229,255,0.25); color: #F5F7FA; }
</style>
</head>
<body class="bg-vault-black text-vault-text font-body antialiased min-h-screen">

  <!-- Password Gate -->
  <div id="gateScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm rounded-3xl border border-vault-border bg-vault-surface/60 backdrop-blur p-8 shadow-glow-cyan">
      <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-vault-cyan to-vault-blue flex items-center justify-center font-mono font-bold text-vault-black text-lg mb-5">V</div>
      <h1 class="font-display font-semibold text-2xl mb-1">Admin Access</h1>
      <p class="text-vault-muted text-sm mb-6">VaultTap control panel — authorized accounts only.</p>
      <input id="adminPass" type="password" placeholder="Admin password" class="w-full bg-vault-surface2 border border-vault-border rounded-xl px-4 py-3.5 text-sm placeholder-vault-muted mb-4 focus:outline-none focus:border-vault-cyan/60 focus:ring-1 focus:ring-vault-cyan/40 transition">
      <button onclick="accessAdmin()" class="w-full py-3.5 bg-gradient-to-r from-vault-cyan to-vault-blue text-vault-black rounded-xl font-semibold hover:brightness-110 active:brightness-95 transition">Access Admin</button>
      <button onclick="resetAdminPassword()" class="w-full mt-3 font-mono text-xs text-vault-cyan hover:underline">Forgot password?</button>
      <p id="gateError" class="mt-4 text-center text-sm text-red-400"></p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="hidden max-w-2xl mx-auto p-5 sm:p-6 pb-16">
    <div class="flex items-center justify-between py-4 mb-4">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-vault-cyan to-vault-blue flex items-center justify-center font-mono font-bold text-vault-black text-lg">V</div>
        <span class="font-display font-semibold text-lg tracking-tight">Admin Panel</span>
      </div>
      <button onclick="logOutAdmin()" class="text-sm font-mono text-vault-muted hover:text-red-400 transition-colors">Log Out</button>
    </div>

    <div class="rounded-3xl border border-vault-border bg-vault-surface/60 p-6 mb-5">
      <p class="font-mono text-xs uppercase tracking-widest text-vault-cyan mb-1">Today's Words</p>
      <p class="text-vault-muted text-sm mb-5">Exactly 9 letters each, no spaces.</p>

      <label class="block font-mono text-xs uppercase tracking-widest text-vault-muted mb-2">YouTube Word</label>
      <input id="cfgWord1" type="text" maxlength="9" placeholder="9 LETTERS" class="w-full bg-vault-surface2 border border-vault-border rounded-xl px-4 py-3.5 text-sm font-mono tracking-widest uppercase placeholder-vault-muted mb-4 focus:outline-none focus:border-vault-cyan/60 focus:ring-1 focus:ring-vault-cyan/40 transition">

      <label class="block font-mono text-xs uppercase tracking-widest text-vault-muted mb-2">Telegram Word</label>
      <input id="cfgWord2" type="text" maxlength="9" placeholder="9 LETTERS" class="w-full bg-vault-surface2 border border-vault-border rounded-xl px-4 py-3.5 text-sm font-mono tracking-widest uppercase placeholder-vault-muted mb-4 focus:outline-none focus:border-vault-cyan/60 focus:ring-1 focus:ring-vault-cyan/40 transition">

      <label class="block font-mono text-xs uppercase tracking-widest text-vault-muted mb-2">X Word</label>
      <input id="cfgWord3" type="text" maxlength="9" placeholder="9 LETTERS" class="w-full bg-vault-surface2 border border-vault-border rounded-xl px-4 py-3.5 text-sm font-mono tracking-widest uppercase placeholder-vault-muted focus:outline-none focus:border-vault-cyan/60 focus:ring-1 focus:ring-vault-cyan/40 transition">
    </div>

    <div class="rounded-3xl border border-vault-border bg-vault-surface/60 p-6 mb-5">
      <p class="font-mono text-xs uppercase tracking-widest text-vault-cyan mb-1">Channel Links</p>
      <p class="text-vault-muted text-sm mb-5">Point these at today's specific video or post.</p>

      <label class="block font-mono text-xs uppercase tracking-widest text-vault-muted mb-2">YouTube URL</label>
      <input id="cfgYoutube" type="url" placeholder="https://youtube.com/..." class="w-full bg-vault-surface2 border border-vault-border rounded-xl px-4 py-3.5 text-sm placeholder-vault-muted mb-4 focus:outline-none focus:border-vault-cyan/60 focus:ring-1 focus:ring-vault-cyan/40 transition">

      <label class="block font-mono text-xs uppercase tracking-widest text-vault-muted mb-2">Telegram URL</label>
      <input id="cfgTelegram" type="url" placeholder="https://t.me/..." class="w-full bg-vault-surface2 border border-vault-border rounded-xl px-4 py-3.5 text-sm placeholder-vault-muted mb-4 focus:outline-none focus:border-vault-cyan/60 focus:ring-1 focus:ring-vault-cyan/40 transition">

      <label class="block font-mono text-xs uppercase tracking-widest text-vault-muted mb-2">X URL</label>
      <input id="cfgX" type="url" placeholder="https://x.com/..." class="w-full bg-vault-surface2 border border-vault-border rounded-xl px-4 py-3.5 text-sm placeholder-vault-muted focus:outline-none focus:border-vault-cyan/60 focus:ring-1 focus:ring-vault-cyan/40 transition">
    </div>

    <div class="rounded-3xl border border-vault-border bg-vault-surface/60 p-6 mb-5">
      <p class="font-mono text-xs uppercase tracking-widest text-vault-cyan mb-1">Tasks</p>
      <p class="text-vault-muted text-sm mb-5">Clickable bonus actions — e.g. "Follow Billboard on Telegram."</p>
      <div id="taskRows" class="space-y-4"></div>
      <button type="button" onclick="addTaskRow()" class="mt-4 w-full py-3 border border-dashed border-vault-border rounded-xl text-sm text-vault-muted hover:border-vault-cyan/50 hover:text-vault-cyan transition">+ Add Task</button>
      <button onclick="saveTasks()" class="mt-4 w-full py-3.5 bg-gradient-to-r from-vault-cyan to-vault-blue text-vault-black rounded-xl font-semibold hover:brightness-110 active:brightness-95 transition">Save Tasks</button>
      <p id="taskSaveStatus" class="mt-3 text-center text-sm text-vault-muted"></p>
    </div>

    <button onclick="saveConfig()" class="w-full py-4 bg-gradient-to-r from-vault-cyan to-vault-blue text-vault-black rounded-2xl font-semibold hover:brightness-110 active:brightness-95 transition">Save Changes</button>
    <p id="saveStatus" class="mt-3 text-center text-sm text-vault-muted"></p>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCHChejRDWTpo846YDC9zfQ56rpUXQhRLk",
      authDomain: "vaulttap-c7c4b.firebaseapp.com",
      projectId: "vaulttap-c7c4b",
      storageBucket: "vaulttap-c7c4b.firebasestorage.app",
      messagingSenderId: "138581294927",
      appId: "1:138581294927:web:38637cdfc4b172b43a0f3a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // This must be a real Firebase Auth account you create yourself.
    // Only its UID (set in your Firestore rules) is allowed to write to /config.
    const ADMIN_EMAIL = "admin@vaulttap.site";

    async function accessAdmin() {
      const pass = document.getElementById('adminPass').value;
      const errorEl = document.getElementById('gateError');
      errorEl.textContent = '';
      if (!pass) { errorEl.textContent = "Enter the admin password."; return; }

      try {
        await auth.signInWithEmailAndPassword(ADMIN_EMAIL, pass);
        document.getElementById('gateScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadConfig();
        loadTasks();
      } catch (err) {
        errorEl.textContent = "Access denied.";
      }
    }

    function resetAdminPassword() {
      auth.sendPasswordResetEmail(ADMIN_EMAIL)
        .then(() => alert("Password reset email sent to " + ADMIN_EMAIL))
        .catch(err => alert("Error: " + err.message));
    }

    function logOutAdmin() {
      auth.signOut().then(() => {
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('adminPass').value = '';
        document.getElementById('gateScreen').classList.remove('hidden');
      });
    }

    function escapeAttr(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    let taskRowCounter = 0;

    function addTaskRow(task) {
      taskRowCounter++;
      const id = (task && task.id) || ('task_' + Date.now() + '_' + taskRowCounter);
      const wrap = document.createElement('div');
      wrap.className = "task-row rounded-2xl border border-vault-border bg-vault-surface2 p-4 relative";
      wrap.dataset.taskId = id;
      wrap.innerHTML =
        '<button type="button" onclick="this.closest(\'.task-row\').remove()" class="absolute top-3 right-3 text-vault-muted hover:text-red-400 transition-colors"><i class="fa-solid fa-xmark"></i></button>' +
        '<label class="block font-mono text-[10px] uppercase tracking-widest text-vault-muted mb-1.5">Label</label>' +
        '<input type="text" class="task-label w-full bg-vault-surface border border-vault-border rounded-lg px-3 py-2.5 text-sm mb-3" placeholder="Follow Billboard on Telegram" value="' + escapeAttr(task && task.label) + '">' +
        '<div class="grid grid-cols-2 gap-3">' +
          '<div><label class="block font-mono text-[10px] uppercase tracking-widest text-vault-muted mb-1.5">VP Reward</label>' +
          '<input type="number" class="task-reward w-full bg-vault-surface border border-vault-border rounded-lg px-3 py-2.5 text-sm" placeholder="30" value="' + (task ? task.reward : '') + '"></div>' +
          '<div><label class="block font-mono text-[10px] uppercase tracking-widest text-vault-muted mb-1.5">URL</label>' +
          '<input type="url" class="task-url w-full bg-vault-surface border border-vault-border rounded-lg px-3 py-2.5 text-sm" placeholder="https://t.me/..." value="' + escapeAttr(task && task.url) + '"></div>' +
        '</div>';
      document.getElementById('taskRows').appendChild(wrap);
    }

    function loadTasks() {
      db.collection('config').doc('tasks').get()
        .then(doc => {
          const data = doc.exists ? doc.data() : {};
          const tasks = data.tasks || [];
          document.getElementById('taskRows').innerHTML = '';
          tasks.forEach(t => addTaskRow(t));
        })
        .catch(err => console.error('Could not load tasks:', err));
    }

    async function saveTasks() {
      const statusEl = document.getElementById('taskSaveStatus');
      const rows = document.querySelectorAll('.task-row');
      const tasks = [];
      for (const row of rows) {
        const label = row.querySelector('.task-label').value.trim();
        const reward = parseInt(row.querySelector('.task-reward').value, 10);
        const url = row.querySelector('.task-url').value.trim();
        if (!label || !url || !reward || reward <= 0) {
          statusEl.textContent = "Every task needs a label, a positive VP reward, and a URL.";
          statusEl.className = "mt-3 text-center text-sm text-red-400";
          return;
        }
        tasks.push({ id: row.dataset.taskId, label: label, reward: reward, url: url });
      }

      try {
        await db.collection('config').doc('tasks').set({
          tasks: tasks,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        statusEl.textContent = "Saved — live for all users now.";
        statusEl.className = "mt-3 text-center text-sm text-vault-mint";
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        statusEl.className = "mt-3 text-center text-sm text-red-400";
      }
    }

    function loadConfig() {
      db.collection('config').doc('daily').get()
        .then(doc => {
          const data = doc.exists ? doc.data() : {};
          document.getElementById('cfgWord1').value = data.word1 || '';
          document.getElementById('cfgWord2').value = data.word2 || '';
          document.getElementById('cfgWord3').value = data.word3 || '';
          document.getElementById('cfgYoutube').value = data.youtubeUrl || '';
          document.getElementById('cfgTelegram').value = data.telegramUrl || '';
          document.getElementById('cfgX').value = data.xUrl || '';
        })
        .catch(err => {
          document.getElementById('saveStatus').textContent = "Could not load current config: " + err.message;
          document.getElementById('saveStatus').className = "mt-3 text-center text-sm text-red-400";
        });
    }

    async function saveConfig() {
      const statusEl = document.getElementById('saveStatus');
      const word1 = document.getElementById('cfgWord1').value.trim().toUpperCase();
      const word2 = document.getElementById('cfgWord2').value.trim().toUpperCase();
      const word3 = document.getElementById('cfgWord3').value.trim().toUpperCase();
      const nineLetters = /^[A-Z]{9}$/;

      if (![word1, word2, word3].every(w => nineLetters.test(w))) {
        statusEl.textContent = "Each word must be exactly 9 letters, A-Z only.";
        statusEl.className = "mt-3 text-center text-sm text-red-400";
        return;
      }

      try {
        await db.collection('config').doc('daily').set({
          word1: word1,
          word2: word2,
          word3: word3,
          youtubeUrl: document.getElementById('cfgYoutube').value.trim(),
          telegramUrl: document.getElementById('cfgTelegram').value.trim(),
          xUrl: document.getElementById('cfgX').value.trim(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        statusEl.textContent = "✅ Saved — live for all users now.";
        statusEl.className = "mt-3 text-center text-sm text-vault-mint";
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        statusEl.className = "mt-3 text-center text-sm text-red-400";
      }
    }

    // If already signed in as the admin (session persisted), skip straight to the panel
    auth.onAuthStateChanged(user => {
      if (user && user.email === ADMIN_EMAIL) {
        document.getElementById('gateScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadConfig();
        loadTasks();
      }
    });
  </script>
</body>
</html>
